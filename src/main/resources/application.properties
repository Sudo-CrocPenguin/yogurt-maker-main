# Database Configuration
spring.datasource.url=jdbc:h2:mem:yogurtdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop  
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true  

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Logging
logging.level.com.yogurtmaker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server
server.port=8080

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ============================================
# Configuración de SpringDoc OpenAPI / Swagger
# ============================================

# Ruta de la interfaz Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Ruta del archivo JSON de OpenAPI
springdoc.api-docs.path=/v3/api-docs

# Habilitar la interfaz Swagger UI
springdoc.swagger-ui.enabled=true

# Ordenar los endpoints alfabéticamente
springdoc.swagger-ui.operationsSorter=alpha

# Ordenar los tags alfabéticamente
springdoc.swagger-ui.tagsSorter=alpha

# Mostrar la duración de las peticiones
springdoc.swagger-ui.displayRequestDuration=true

# Título y descripción global de la API
springdoc.info.title=API de Yogurt Maker
springdoc.info.description=API REST para la gestión de producción de yogurt artesanal. Incluye gestión de recetas, lotes de producción y monitoreo de temperatura.
springdoc.info.version=1.0.0
springdoc.info.contact.name=DanielDev87
springdoc.info.contact.email=soporte@yogurtmaker.com